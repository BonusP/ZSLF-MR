# ============================================================
# ZSLF-MR2 — Unified MRI Reconstruction Config
# Pipeline: EDITER → LORAKS → DDNM
# ============================================================

# --- Run Selection ---
run:
  datasets: [1]   # choose which datasets to run: [1], [2], or [1, 2]

# --- Data ---
data:
  mat_path_1: "dataset/data1_BBEMI_2D_brainslice.mat"
  mat_path_2: "dataset/data2_BBEMI_2D_brainslice.mat"

# --- EDITER ---
editer:
  Nc: 5
  ksz_col_init: 0
  ksz_lin_init: 0
  corr_thresh: 0.5
  ksz_col_final: 7
  ksz_lin_final: 0

# --- LORAKS ---
loraks:
  R: 4
  rank: 25
  lam: 1.0e-2
  tol: 1.0e-3
  max_iter: 5
  LORAKS_type: 1
  cg_maxiter: 200
  cg_tol: 1.0e-5

# --- DDNM ---
ddnm:
  checkpoint_path: "assets/ddnm/exp/logs/imagenet/256x256_diffusion_uncond.pt"
  sigma_y: 0.07
  eta: 0.85
  image_size: 256
  channels: 3
  use_fp16: true
  # crop/pad settings (LORAKS img → 256x256 padded)
  crop_top: 27
  crop_bottom: 28
  crop_left: 77
  crop_right: 78
  # Diffusion schedule
  beta_schedule: linear
  beta_start: 0.0001
  beta_end: 0.02
  num_diffusion_timesteps: 1000
  # Time-travel sampling
  T_sampling: 100
  travel_length: 1
  travel_repeat: 1

# --- Output ---
output:
  results_dir: "results"
  save_npy: true        # also save .npy for each stage output

# --- view transform (legacy_view) ---
view:
  # applied as: abs(flip(rot90(arr,1),1))[:, col_start:col_end]
  col_start: 165
  col_end: 366
